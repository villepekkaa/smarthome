<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartHome Dashboard</title>
  <link rel="stylesheet" href="/static/css/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>SmartHome Dashboard</h1>
  <div class="muted">API: <code id="apiHost">same origin</code></div>

  <div class="panel row">
    <strong>Thresholds</strong>
    <label>Offline (min): <input id="offlineMin" type="number" value="15" min="1" max="240"></label>
    <label>Battery low (mV): <input id="batteryLow" type="number" value="2600" min="1500" max="4000"></label>
    <label>Humidity warn (%): <input id="humidityWarn" type="number" value="70" min="0" max="100"></label>
    <label>Temp high (deg C): <input id="tempHigh" type="number" value="28" min="-50" max="120" step="0.1"></label>
  </div>

  <div class="panel row">
    <label for="sensorSelect">History sensor:</label>
    <select id="sensorSelect"></select>
    <label for="limitInput">Points:</label>
    <input id="limitInput" type="number" min="10" max="2000" value="200">
    <button id="loadBtn">Load history</button>
    <button id="autoBtn">Auto refresh: ON</button>
    <span id="lastRefresh" class="muted"></span>
  </div>

  <div class="grid" id="cards"></div>

  <div id="chartWrap">
    <canvas id="historyChart" height="90"></canvas>
  </div>

  <div class="panel">
    <h3 class="panel-title">Alerts</h3>
    <div id="alertSummary" class="summary"></div>
    <div id="alertList"></div>
  </div>

  <div id="errorBox" class="error"></div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
